name: Release

on:
  release:
    types: [created]
  workflow_dispatch:

permissions: read-all

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.release.target_commitish }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm packages
        run: npm install

      - name: Install dependencies
        run: |
          if [ ! -f package-lock.json ]; then
            echo "Error: package-lock.json not found. Please ensure it exists and matches package.json."
            exit 1
          fi
          npm ci

      - name: Build
        run: npm run build

      - name: Commit dist folder
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add dist/
          
          # Set release tag name or use commit SHA for workflow_dispatch
          RELEASE_TAG="${GITHUB_EVENT_RELEASE_TAG_NAME}"
          if [ -z "$RELEASE_TAG" ]; then
            RELEASE_TAG="$(git rev-parse --short HEAD)"
          fi
          
          git commit -m "chore: update dist for release ${RELEASE_TAG}" || echo "No changes to commit"
          
          # Set target branch - use release target branch or default branch
          TARGET_BRANCH="${GITHUB_EVENT_RELEASE_TARGET_COMMITISH}"
          if [ -z "$TARGET_BRANCH" ]; then
            TARGET_BRANCH="${GITHUB_REF#refs/heads/}"
          fi
          
          # Push to the correct branch
          git push origin HEAD:"$TARGET_BRANCH"
        env:
          GITHUB_EVENT_RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}
          GITHUB_EVENT_RELEASE_TARGET_COMMITISH: ${{ github.event.release.target_commitish }}
